stages:
  - validate
  - fetch
  - inject

variables:
  DOMINO_PROJECT_NAME: ""
  VAULT_COS_NAME: ""
  AP_CODE: ""
  VAULT_NAMESPACE: ""
  VAULT_ENV: ""

before_script:
  - apk add --no-cache bash curl jq
  - chmod +x scripts/copy_vault_to_domino_env.sh

validate:
  stage: validate
  image: alpine:3.20
  script:
    - ./scripts/copy_vault_to_domino_env.sh validate "$DOMINO_PROJECT_NAME" "$VAULT_COS_NAME" "$AP_CODE" "$VAULT_NAMESPACE" "$VAULT_ENV"

fetch_vault:
  stage: fetch
  image: alpine:3.20
  script:
    - ./scripts/copy_vault_to_domino_env.sh fetch "$DOMINO_PROJECT_NAME" "$VAULT_COS_NAME" "$AP_CODE" "$VAULT_NAMESPACE" "$VAULT_ENV"
  artifacts:
    reports:
      dotenv: secrets.env
    expire_in: 10 minutes

inject_domino:
  stage: inject
  image: alpine:3.20
  when: manual
  dependencies:
    - fetch_vault
  script:
    - ./scripts/copy_vault_to_domino_env.sh inject "$DOMINO_PROJECT_NAME" "$VAULT_COS_NAME" "$AP_CODE" "$VAULT_NAMESPACE" "$VAULT_ENV"
    
